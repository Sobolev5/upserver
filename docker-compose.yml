version: '3.2'

services:

  upserver-postgres:
    container_name: upserver-postgres
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /data/pgdata
    volumes:
      - upserver-db:/data/pgdata
    expose:
      - "5432"
    networks:
      - postgres
    restart: unless-stopped
    networks:
      - upserver  

  upserver-interface:
    container_name: upserver-interface
    build: 
      context: ./interface/
      dockerfile: Dockerfile 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY} 
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD} 
    restart: unless-stopped 
    depends_on: 
      - upserver-postgres    
    ports:
      - 12345:12345
    networks:
      - upserver  

  upserver-source:
    container_name: upserver-source
    build: 
      context: ./source/
      dockerfile: Dockerfile  
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DEBUG: ${DEBUG}  
    restart: unless-stopped 
    depends_on: 
      - upserver-postgres
    networks:
      - upserver  

networks:
  upserver:
    driver: bridge
  
volumes:
  upserver-db: